- name: Ensure .kube directory exists
  ansible.builtin.file:
    path: "{{ cluster_admin_home }}/.kube"
    state: directory
    owner: "{{ cluster_admin_user }}"
    group: "{{ cluster_admin_user }}"
    mode: "0700"

- name: Install kubeconfig for admin user
  ansible.builtin.copy:
    src: "{{ k3s_kubeconfig_src }}"
    dest: "{{ cluster_admin_home }}/.kube/config"
    remote_src: true
    owner: "{{ cluster_admin_user }}"
    group: "{{ cluster_admin_user }}"
    mode: "0600"
