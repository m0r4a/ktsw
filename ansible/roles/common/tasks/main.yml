- name: Clean DNF cache before update
  ansible.builtin.command: dnf clean all
  changed_when: false
  tags: [packages]

- name: Update all packages
  ansible.builtin.dnf:
    name: "*"
    state: latest
    update_cache: true
  register: _dnf_update
  tags: [packages]

- name: Install required packages
  ansible.builtin.dnf:
    name: "{{ common_base_packages + common_extra_packages }}"
    state: present
  register: _dnf_install
  tags: [packages]

- name: Reboot if kernel or modules were updated
  ansible.builtin.reboot:
    reboot_timeout: 300
    post_reboot_delay: 20
    msg: "Rebooting after package update"
  when:
    - (_dnf_update.changed or _dnf_install.changed)
    - allow_reboot_on_update | bool
  tags: [packages]

# Swap

- name: Check if swap is active
  ansible.builtin.command: swapon --show --noheadings
  register: _swap_status
  changed_when: false
  tags: [swap]

- name: Disable swap immediately
  ansible.builtin.command: swapoff -a
  when: _swap_status.stdout | length > 0
  tags: [swap]

- name: Disable swap in fstab
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^([^#\n].*\s+swap\s+.*)$'
    replace: '# \1'
    backup: true
  tags: [swap]

# Kernel modules

- name: Configure kernel modules to load at boot
  ansible.builtin.copy:
    dest: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      br_netfilter
    owner: root
    group: root
    mode: "0644"
  tags: [kernel]

- name: Load kernel modules
  community.general.modprobe:
    name: "{{ item }}"
    state: present
  loop: "{{ k8s_kernel_modules }}"
  tags: [kernel]

# Systemd

- name: Apply sysctl parameters for Kubernetes
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    sysctl_file: /etc/sysctl.d/k8s.conf
    reload: true
    state: present
  loop: "{{ k8s_sysctl_params | dict2items }}"
  notify: reload sysctl
  tags: [sysctl]
