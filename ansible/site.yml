- name: Common node preparation
  hosts: k3s_cluster
  become: true
  gather_facts: true
  roles:
    - role: common
      tags: [common]

- name: Bootstrap k3s control plane
  hosts: control_plane
  become: true
  gather_facts: true
  roles:
    - role: k3s_server
      tags: [k3s, server]

- name: Join k3s workers
  hosts: worker
  become: true
  gather_facts: true
  roles:
    - role: k3s_agent
      tags: [k3s, agent]
