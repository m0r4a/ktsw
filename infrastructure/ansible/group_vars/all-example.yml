# This is an example of how the auto-generated all.yml looks
# You can use this as reference to use the playbook as a standalone thing.

# Cluster networking
k3s_control_plane_ip: "10.0.0.10"
k3s_cluster_cidr: "11.0.0.0/16"
k3s_service_cidr: "11.1.0.0/16"
k3s_api_port: 6443

# Admin user
cluster_admin_user: "my_user"
cluster_admin_home: "/home/my_user"

# Tool versions
cilium_chart_version: "1.19.1"
cilium_values_url: "https://raw.githubusercontent.com/m0r4a/flux_cd_testing/refs/heads/main/apps/infrastructure/cilium/values.yaml"

# Install script URLs
k3s_install_script_url: "https://get.k3s.io"
helm_install_script_url: "https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3"
flux_install_script_url: "https://fluxcd.io/install.sh"

cilium_cli_stable_url: "https://raw.githubusercontent.com/cilium/cilium-cli/main/stable.txt"
hubble_cli_stable_url: "https://raw.githubusercontent.com/cilium/hubble/main/stable.txt"

# Reboot policy
allow_reboot_on_update: true

ansible_python_interpreter: auto_silent
