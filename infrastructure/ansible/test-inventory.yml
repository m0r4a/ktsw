---
- name: Test connectivity to all nodes
  hosts: all
  gather_facts: yes
  tasks:
    - name: Ping all hosts
      ansible.builtin.ping:

    - name: Display hostname
      ansible.builtin.debug:
        msg: "Connected to {{ ansible_hostname }} ({{ inventory_hostname }})"

    - name: Show OS information
      ansible.builtin.debug:
        msg: "OS: {{ ansible_distribution }} {{ ansible_distribution_version }}"

    - name: Check uptime
      ansible.builtin.command: uptime
      register: uptime_result
      changed_when: false

    - name: Display uptime
      ansible.builtin.debug:
        var: uptime_result.stdout

- name: Test control-plane nodes
  hosts: control-plane
  gather_facts: no
  tasks:
    - name: Identify control-plane nodes
      ansible.builtin.debug:
        msg: "This is a control-plane node: {{ inventory_hostname }}"

- name: Test worker nodes
  hosts: worker
  gather_facts: no
  tasks:
    - name: Identify worker nodes
      ansible.builtin.debug:
        msg: "This is a worker node: {{ inventory_hostname }}"
