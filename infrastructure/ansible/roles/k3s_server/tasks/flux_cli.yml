- name: Check if Flux CLI is already installed
  ansible.builtin.stat:
    path: "{{ flux_binary }}"
  register: _flux_stat

- name: Download Flux install script
  ansible.builtin.get_url:
    url: "{{ flux_install_script_url }}"
    dest: /tmp/install-flux.sh
    mode: "0755"
  when: not _flux_stat.stat.exists

- name: Run Flux install script
  ansible.builtin.command: /tmp/install-flux.sh
  environment:
    PATH: "/usr/local/bin:/usr/bin:/bin"
  when: not _flux_stat.stat.exists
  changed_when: true

- name: Remove Flux install script
  ansible.builtin.file:
    path: /tmp/install-flux.sh
    state: absent
